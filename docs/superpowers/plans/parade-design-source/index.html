<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Arsenal Victory Parade · Shippie</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    :root {
      --ink: #14120F;        /* deep warm black — text + ink */
      --cream: #F5EFE4;      /* warm paper */

      /* surface levels on paper */
      --paper:   #F5EFE4;
      --paper-2: #EDE6D5;    /* slightly deeper card surface */
      --paper-3: #E2D7BF;    /* deepest tint, used sparingly */

      /* ink alphas on paper (text + lines) */
      --ink-dim:   rgba(20,18,15,0.75);
      --ink-mute:  rgba(20,18,15,0.5);
      --ink-faint: rgba(20,18,15,0.32);
      --ink-bare:  rgba(20,18,15,0.14);
      --line:        rgba(20,18,15,0.14);
      --line-strong: rgba(20,18,15,0.25);

      /* legacy aliases (a few places still reference these) */
      --cream-dim:   rgba(20,18,15,0.75);
      --cream-mute:  rgba(20,18,15,0.5);
      --cream-faint: rgba(20,18,15,0.32);

      --red: #EF0107;
      --red-deep: #C40006;
      --red-soft: rgba(239,1,7,0.08);
      --gold: #EDBB4A;
      --gold-deep: #A37918;
      --gold-soft: rgba(237,187,74,0.18);
      --sage: #5E7B5C;
      --sunset: #E8603C;

      --accent: var(--red);
      --accent-soft: rgba(239,1,7,0.08);
      --accent-glow: rgba(239,1,7,0.18);

      --serif: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
      --sans: 'General Sans', -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    }
    html, body { margin: 0; background: #f0eee9; font-family: var(--sans); }
    * { box-sizing: border-box; }

    /* ───── Shippie app shell utilities (sharp corners everywhere, paper mode) ───── */
    .shippie-screen {
      width: 100%; height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .mono { font-family: var(--mono); font-feature-settings: 'ss01'; letter-spacing: 0; }
    .serif { font-family: var(--serif); }
    .label {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--red); font-weight: 600;
    }
    .label-mute {
      font-family: var(--mono);
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-mute); font-weight: 500;
    }
    .hairline { background: var(--line); }
    .hairline-h { height: 1px; background: var(--line); }

    /* ───── Status bar (Shippie-styled, sharp, on paper) ───── */
    .status-bar {
      height: 44px; padding: 14px 20px 0; display: flex;
      align-items: center; justify-content: space-between;
      color: var(--ink); font-family: var(--mono); font-size: 12px;
      flex-shrink: 0;
    }
    .status-bar .ind { display: flex; gap: 5px; align-items: center; }
    .status-bar .dot { width: 4px; height: 4px; background: var(--ink); }

    /* ───── Home indicator (dark, on paper) ───── */
    .home-indicator {
      position: absolute; bottom: 8px; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 3px; background: var(--ink);
    }

    /* ───── Pulse glow for "You are here" GPS dot (red, on paper) ───── */
    @keyframes gpsPulse {
      0%   { transform: scale(1);   opacity: 0.6; }
      80%  { transform: scale(2.6); opacity: 0; }
      100% { transform: scale(2.6); opacity: 0; }
    }
    .gps-ring {
      position: absolute; inset: 0;
      border: 1.5px solid var(--red);
      animation: gpsPulse 2.2s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
      border-radius: 50%;
    }

    /* ───── ARSENAL wordmark band (top stripe used on phone screens) ───── */
    .wordmark-band {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 20px 10px;
      flex-shrink: 0;
      white-space: nowrap;
      border-bottom: 1.5px solid var(--red);
    }
    .wordmark-band .rule {
      flex: 1 1 auto; min-width: 12px; height: 1px; background: var(--red);
    }
    .wordmark-band .mark {
      font-family: var(--mono);
      font-size: 11px; letter-spacing: 0.28em;
      color: var(--red); padding-right: 2px;
      font-weight: 700; line-height: 1; flex-shrink: 0;
    }
    .wordmark-band .meta {
      font-family: var(--mono);
      font-size: 9px; letter-spacing: 0.14em;
      color: var(--ink-mute); text-transform: uppercase;
      line-height: 1; flex-shrink: 0;
    }
    .gps-ring.delay { animation-delay: 1.1s; }
    .gps-core {
      width: 14px; height: 14px; background: var(--red);
      border-radius: 50%;
      box-shadow: 0 0 0 3px var(--paper), 0 0 24px rgba(239,1,7,0.45), 0 0 0 1px var(--ink);
    }

    /* ───── Celebrate button pulse ───── */
    @keyframes goldHalo {
      0%, 100% { transform: scale(1);   opacity: 0.45; }
      50%      { transform: scale(1.06); opacity: 0.7; }
    }
    @keyframes goldRipple {
      0%   { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(2.0); opacity: 0; }
    }

    /* ───── Live "now" pip ───── */
    @keyframes livePip {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }
    .live-pip {
      display: inline-block; width: 6px; height: 6px; background: var(--red);
      animation: livePip 1.6s ease-in-out infinite;
    }

    /* ───── Map paper-grain texture ───── */
    .stipple {
      background-image:
        radial-gradient(rgba(20,18,15,0.05) 1px, transparent 1px),
        radial-gradient(rgba(20,18,15,0.035) 1px, transparent 1px);
      background-size: 14px 14px, 23px 23px;
      background-position: 0 0, 7px 11px;
    }

    /* ───── Canvas header pulled in ───── */
    .canvas-readme {
      position: absolute;
      bottom: 24px; left: 24px;
      max-width: 360px;
      font-family: var(--mono); font-size: 11px;
      color: rgba(60,50,40,0.65); line-height: 1.5;
      z-index: 2;
    }
    .canvas-readme strong { color: rgba(40,30,20,0.9); font-weight: 600; }

    /* ───── No iOS button styles bleed ───── */
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="screens/Shell.jsx"></script>
  <script type="text/babel" src="screens/Map.jsx"></script>
  <script type="text/babel" src="screens/Group.jsx"></script>
  <script type="text/babel" src="screens/Celebrate.jsx"></script>
  <script type="text/babel" src="screens/Info.jsx"></script>
  <script type="text/babel" src="screens/ShareCard.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
