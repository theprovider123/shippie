<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" role="img" aria-label="Shippie architecture showing maker tools, deploy truth, URL ownership, the Shippie container, local device runtime, peers, and Hub">
  <title>Shippie architecture - container-first, URL-first ownership</title>
  <desc>Apps enter through maker tools, pass through deploy truth on the hosted or local platform, become portable package artifacts, and run through standalone URLs or the Shippie container. User data and AI models live on device; peers connect directly; Hub can serve a local node.</desc>

  <defs>
    <style>
      .bg { fill: #FAF7EF; }
      .ink { fill: #14120F; }
      .muted { fill: #746B60; }
      .line { stroke: #D9CEB8; stroke-width: 1.4; fill: none; }
      .dash { stroke: #B8AA90; stroke-width: 1.5; stroke-dasharray: 5 6; fill: none; }
      .arrow { stroke: #2C1F14; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #8FA28B; stroke-width: 1.6; fill: none; marker-end: url(#arrow-soft); }
      .panel { fill: #FFFDF7; stroke: #D9CEB8; stroke-width: 1.2; }
      .dark { fill: #17130F; stroke: #352D24; stroke-width: 1.2; }
      .dark2 { fill: #2A241D; stroke: #4A3B30; stroke-width: 1.1; }
      .cream { fill: #F5EBDD; }
      .accent { fill: #E8603C; }
      .sage { fill: #5E7B5C; }
      .gold { fill: #DDAF38; }
      .blue { fill: #527D91; }
      .h { font-family: Georgia, serif; font-size: 28px; font-weight: 700; letter-spacing: -0.01em; }
      .h2 { font-family: Georgia, serif; font-size: 20px; font-weight: 700; }
      .eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; fill: #8B847A; }
      .small { font-size: 11px; fill: #746B60; }
      .body { font-size: 12px; fill: #2C1F14; }
      .body-cream { font-size: 12px; fill: #F5EBDD; }
      .small-cream { font-size: 11px; fill: #CFC2AA; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C1F14"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5E7B5C"/>
    </marker>
  </defs>

  <rect width="1280" height="820" class="bg"/>

  <text x="64" y="54" class="h ink">Shippie architecture</text>
  <text x="64" y="78" class="small">Container-first experience. URL-first ownership. Package-first portability. Local by default, hosted when useful.</text>

  <text x="72" y="126" class="eyebrow">1. Makers</text>
  <rect x="64" y="146" width="218" height="222" rx="12" class="panel"/>
  <text x="84" y="178" class="h2 ink">Build anywhere</text>
  <text x="84" y="208" class="body">Claude Code / Cursor</text>
  <text x="84" y="234" class="body">CLI: shippie deploy ./dist</text>
  <text x="84" y="260" class="body">GitHub Actions build</text>
  <text x="84" y="286" class="body">Web zip upload</text>
  <text x="84" y="326" class="small">Makers keep source, repo, URL,</text>
  <text x="84" y="344" class="small">and custom-domain ownership.</text>

  <path class="arrow" d="M 292 258 L 358 258"/>
  <text x="306" y="244" class="small">deploy</text>

  <text x="374" y="126" class="eyebrow">2. Deploy truth</text>
  <rect x="358" y="146" width="306" height="222" rx="14" class="dark"/>
  <text x="382" y="178" class="h2 cream">Hosted or local platform</text>
  <text x="382" y="208" class="body-cream">Framework/output detection</text>
  <text x="382" y="232" class="body-cream">Security + privacy scan</text>
  <text x="382" y="256" class="body-cream">App kind classification</text>
  <text x="382" y="280" class="body-cream">Health check + deploy stream</text>
  <text x="382" y="318" class="small-cream">Artifacts, not only DB rows:</text>
  <text x="382" y="340" class="small-cream">deploy-report.json + events.ndjson</text>

  <path class="arrow" d="M 674 258 L 744 258"/>
  <text x="690" y="244" class="small">package</text>

  <text x="760" y="126" class="eyebrow">3. Portable output</text>
  <rect x="744" y="146" width="230" height="222" rx="12" class="panel"/>
  <text x="764" y="178" class="h2 ink">.shippie package</text>
  <text x="764" y="208" class="body">Static app files</text>
  <text x="764" y="232" class="body">Manifest + permissions</text>
  <text x="764" y="256" class="body">Version lineage</text>
  <text x="764" y="280" class="body">Custom domains</text>
  <text x="764" y="318" class="small">Same artifact can be served by</text>
  <text x="764" y="336" class="small">shippie.app or hub.local.</text>

  <path class="arrow" d="M 984 220 L 1074 178"/>
  <path class="arrow" d="M 984 290 L 1074 338"/>
  <text x="1014" y="206" class="small">open URL</text>
  <text x="1008" y="318" class="small">open in container</text>

  <text x="1092" y="126" class="eyebrow">4. User experience</text>
  <rect x="1074" y="146" width="150" height="96" rx="12" class="panel"/>
  <text x="1092" y="176" class="h2 ink">Standalone URL</text>
  <text x="1092" y="204" class="body">slug.shippie.app</text>
  <text x="1092" y="224" class="small">custom domains still work</text>

  <rect x="1054" y="278" width="190" height="212" rx="24" class="dark"/>
  <text x="1082" y="314" class="h2 cream">Shippie app</text>
  <text x="1082" y="338" class="small-cream">one installed PWA</text>
  <rect x="1080" y="360" width="138" height="34" rx="7" class="dark2"/>
  <text x="1094" y="382" class="body-cream">Your Apps</text>
  <rect x="1080" y="402" width="138" height="34" rx="7" class="dark2"/>
  <text x="1094" y="424" class="body-cream">Marketplace</text>
  <rect x="1080" y="444" width="138" height="34" rx="7" class="dark2"/>
  <text x="1094" y="466" class="body-cream">Your Data</text>

  <text x="72" y="432" class="eyebrow">Runtime boundary</text>
  <rect x="64" y="452" width="1180" height="242" rx="18" class="panel"/>

  <rect x="92" y="490" width="236" height="150" rx="12" fill="#FFF7EA" stroke="#D9CEB8"/>
  <text x="112" y="522" class="h2 ink">Wrap</text>
  <text x="112" y="550" class="body">Install shell, manifest, SW</text>
  <text x="112" y="574" class="body">Haptics, springs, textures</text>
  <text x="112" y="598" class="body">Trust card + proof badges</text>
  <text x="112" y="624" class="small">Shell · Boost · Sense</text>

  <rect x="360" y="490" width="236" height="150" rx="12" fill="#F3F5EA" stroke="#D9CEB8"/>
  <text x="380" y="522" class="h2 ink">Run</text>
  <text x="380" y="550" class="body">SQLite WASM + OPFS files</text>
  <text x="380" y="574" class="body">Shared AI model cache</text>
  <text x="380" y="598" class="body">Backups encrypted by device</text>
  <text x="380" y="624" class="small">Core · AI · Vault</text>

  <rect x="628" y="490" width="236" height="150" rx="12" fill="#EDF5F7" stroke="#D9CEB8"/>
  <text x="648" y="522" class="h2 ink">Connect</text>
  <text x="648" y="550" class="body">SignalRoom for handshake</text>
  <text x="648" y="574" class="body">WebRTC peer-to-peer data</text>
  <text x="648" y="598" class="body">Hub for venues/local nodes</text>
  <text x="648" y="624" class="small">Pulse · Spark · Hub</text>

  <rect x="896" y="490" width="300" height="150" rx="12" fill="#17130F" stroke="#352D24"/>
  <text x="918" y="522" class="h2 cream">Device-owned data</text>
  <text x="918" y="550" class="body-cream">App data never needs Shippie DB</text>
  <text x="918" y="574" class="body-cream">Container isolates apps by permission</text>
  <text x="918" y="598" class="body-cream">Proof/analytics are aggregate only</text>
  <text x="918" y="624" class="small-cream">User can export, transfer, or wipe.</text>

  <path class="arrow-soft" d="M 748 642 C 780 742 1034 742 1082 648"/>
  <text x="902" y="748" class="small">nearby phones exchange data directly after signalling</text>

  <path class="dash" d="M 508 368 C 508 420 508 438 508 452"/>
  <text x="524" y="418" class="small">runtime config + SDK</text>

  <path class="dash" d="M 858 368 C 858 420 746 438 746 452"/>
  <text x="770" y="420" class="small">portable package install</text>

  <text x="72" y="742" class="eyebrow">Open-source local path</text>
  <rect x="64" y="760" width="1180" height="34" rx="8" fill="#FFFDF7" stroke="#D9CEB8"/>
  <rect x="84" y="770" width="14" height="14" class="accent"/>
  <text x="108" y="782" class="small">shippie.app is the hosted node</text>
  <rect x="326" y="770" width="14" height="14" class="sage"/>
  <text x="350" y="782" class="small">hub.local is the venue/private node</text>
  <rect x="610" y="770" width="14" height="14" class="blue"/>
  <text x="634" y="782" class="small">same artifacts, same CLI/MCP core</text>
  <rect x="920" y="770" width="14" height="14" class="gold"/>
  <text x="944" y="782" class="small">federation stays a later protocol layer</text>
</svg>
