<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uniti School Cloud – St Jude's &amp; St Paul's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Sunrise (default) — overridden by theme via JS */
    --primary:       #1B9B7A;
    --primary-light: #E4F5F0;
    --primary-dark:  #137A60;
    --accent:        #E8953A;
    --accent-light:  #FEF0DC;

    /* Feedback palette */
    --got-it:         #2EAD73; --got-it-bg:    #E8F6EF;
    --nearly:         #E8953A; --nearly-bg:    #FEF0DC;
    --revisit:        #D95A57; --revisit-bg:   #FDECEB;
    --absent:         #8B93A1; --absent-bg:    #F1F3F6;
    --sup-yes:        #3A8FCC; --sup-yes-bg:   #E3F2FB;
    --sup-no:         #8B6BD6; --sup-no-bg:    #F0ECFD;

    /* Surfaces */
    --bg:           #F8F7F4;
    --surface:      #FFFFFF;
    --surface-2:    #F2F1EE;
    --border:       #E8E6E3;
    --text:         #1A1917;
    --text-muted:   #6B6864;
    --text-subtle:  #A39F9B;

    /* Shape */
    --radius-sm:  8px;
    --radius:     12px;
    --radius-lg:  20px;
    --shadow:     0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-md:  0 4px 20px rgba(0,0,0,0.10);
    --shadow-lg:  0 8px 40px rgba(0,0,0,0.15);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100vh;
    overflow: hidden;
  }

  #root { height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar       { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-subtle); }

  /* Focus ring */
  :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  button:focus:not(:focus-visible) { outline: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
  integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
  integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
  crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
  integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
  crossorigin="anonymous"></script>

<!-- Data (plain JS) -->
<script src="uniti-data.js"></script>
<!-- UI primitives -->
<script type="text/babel" src="uniti-ui.jsx"></script>
<!-- Screens A: Login, Home, Lesson, Drawer -->
<script type="text/babel" src="uniti-screens-a.jsx"></script>
<!-- Screens B: AI, Timeline, Leadership, Admin -->
<script type="text/babel" src="uniti-screens-b.jsx"></script>
<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<!-- App entry -->
<script type="text/babel" src="uniti-app.jsx"></script>
</head>
<body>
<div id="root"></div>
</body>
</html>
