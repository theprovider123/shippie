name: Release

# Publishes @shippie/cli, @shippie/mcp, and @shippie/sdk to npm when
# a `v*` tag is pushed. Uses npm provenance (OIDC) — no NPM_TOKEN secret
# needed if the repo is configured with Trusted Publishing on npmjs.com.
#
# See docs: https://docs.npmjs.com/generating-provenance-statements

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/cli
          - packages/mcp-server
          - packages/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        working-directory: ${{ matrix.package }}
        run: bun run build

      - name: Publish
        working-directory: ${{ matrix.package }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
