name: deploy-platform

# Auto-deploy apps/platform to Cloudflare Workers on push to main.
# Only fires when the platform code (or workflow itself) changes — keeps
# unrelated repo-wide commits from triggering production redeploys.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with Workers Scripts:Edit + D1:Edit + Workers R2 Storage:Edit + Account Settings:Read
#   CLOUDFLARE_ACCOUNT_ID — already set as CF_ACCOUNT_ID; we re-export below

on:
  push:
    branches: [main]
    paths:
      - 'apps/platform/**'
      - 'packages/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/deploy-platform.yml'
  workflow_dispatch: {}

# Serialize deploys: only one in flight at a time. A new push cancels a
# pending deploy that hasn't started, but lets a running one finish.
concurrency:
  group: deploy-platform
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (platform only)
        working-directory: apps/platform
        run: bun run typecheck

      - name: Test (platform only)
        working-directory: apps/platform
        run: bun run test

      - name: Apply D1 migrations
        working-directory: apps/platform
        run: npx wrangler d1 migrations apply shippie-platform-d1 --remote

      - name: Build wrapper SDK bundle
        working-directory: packages/sdk
        run: bun run build

      - name: Build SvelteKit Worker
        working-directory: apps/platform
        run: bun run build

      - name: Upload wrapper SDK to PLATFORM_ASSETS R2
        working-directory: apps/platform
        run: bun scripts/upload-sdk-bundle.mjs

      - name: Deploy to Cloudflare
        working-directory: apps/platform
        run: npx wrangler deploy

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ Deployed shippie-platform" >> "$GITHUB_STEP_SUMMARY"
            echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "Live at: https://shippie.app" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Deploy failed" >> "$GITHUB_STEP_SUMMARY"
            echo "See job logs for the failing step." >> "$GITHUB_STEP_SUMMARY"
          fi
