<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Shippie App</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #666; margin-bottom: 1.5rem; }
    .card { border: 1px solid #ddd; padding: 1.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Hello from Shippie</h1>
  <p>This is a starter template. Edit index.html and redeploy.</p>
  <div class="card">
    <strong>Deploy:</strong> <code>shippie deploy .</code>
  </div>
  <div class="card">
    <strong>Add a backend:</strong> See <a href="https://docs.shippie.app/sdk/configure">the SDK docs</a>.
  </div>
</body>
</html>
