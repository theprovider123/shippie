<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#14120f" />
    <title>Shippie Offline Launcher</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14120f;
        --panel: #1d1913;
        --text: #ede4d3;
        --muted: #b8a88f;
        --line: rgba(237, 228, 211, 0.16);
        --accent: #e8603c;
      }
      html,
      body,
      #app,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #app {
        position: relative;
      }
      iframe {
        display: block;
        border: 0;
        background: white;
      }
      .status {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }
      .status-card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 24px;
      }
      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        color: var(--accent);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        font-weight: 650;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      button {
        min-height: 44px;
        margin-top: 18px;
        padding: 0 18px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #1a110d;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button.secondary {
        border-color: var(--line);
        background: transparent;
        color: var(--text);
      }
      .actions {
        display: inline-flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <main id="app" aria-live="polite">
      <section class="status">
        <div class="status-card">
          <svg class="mark" viewBox="0 0 64 64" aria-hidden="true">
            <path fill="currentColor" d="M32 8 20 20h24L32 8Zm-9 18h7v7h-7v-7Zm11 0h7v7h-7v-7ZM23 37h7v7h-7v-7Zm11 0h7v7h-7v-7ZM20 48h24v5H20v-5Z" />
          </svg>
          <h1>Opening saved app</h1>
          <p>Shippie is loading the sealed offline capsule on this device.</p>
        </div>
      </section>
    </main>
    <script src="/__shippie/launcher.js"></script>
  </body>
</html>
