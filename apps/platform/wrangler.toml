name = "shippie-platform"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
main = ".svelte-kit/cloudflare/_worker.js"

# Routes — apex + wildcard claim production hostnames. The Worker serves
# the marketplace and maker subdomains directly.
routes = [
  { pattern = "shippie.app/*", zone_name = "shippie.app" },
  { pattern = "*.shippie.app/*", zone_name = "shippie.app" }
]

# D1 — fill in `database_id` after `wrangler d1 create shippie-platform-d1`.
[[d1_databases]]
binding = "DB"
database_name = "shippie-platform-d1"
database_id = "2d938bc0-4a74-457a-aaf3-4932e84e86dc"
migrations_dir = "drizzle"

# R2 buckets — provisioned per preflight checklist.
[[r2_buckets]]
binding = "APPS"
bucket_name = "shippie-apps-prod"

[[r2_buckets]]
binding = "PLATFORM_ASSETS"
bucket_name = "shippie-assets"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "shippie-documents-prod"

# SvelteKit static-content (CSS, JS, images) — served by Workers Assets.
# Binding name `ASSETS` is reserved by adapter-cloudflare; keep the R2
# bucket bound as PLATFORM_ASSETS to avoid the collision.
[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Product shell routes and first-party showcase runtime HTML must run
# through SvelteKit first so their cache-control stays fresh. Include
# both directory shells and nested runtime files; the asset router's
# pattern matching is literal enough that a single parent wildcard can
# miss the iframe's trailing-slash shell and deeper hashed chunks.
run_worker_first = [
  "/",
  "/apps",
  "/apps/*",
  "/container",
  "/run/*",
  "/__shippie-run/*/",
  "/__shippie-run/*/index.html",
  "/__shippie-run/*/assets/*"
]

# KV — fill in `id` after `wrangler kv namespace create shippie-platform-cache`.
[[kv_namespaces]]
binding = "CACHE"
id = "48e2f658cb534627a873decda3bb2f20"

# Cloudflare Email Service — used by the magic-link sign-in flow.
# Requires shippie.app to be onboarded in Cloudflare Email Sending with
# login@shippie.app as a valid sender before production deploy.
[[send_email]]
name = "EMAIL"
remote = true
allowed_sender_addresses = ["login@shippie.app"]

# Phase 6: scheduled triggers.
#   */5 * * * *   reconcile-kv
#   0 * * * *     reap-trials + rollups (both fire on the hour)
#   0 4 * * *     retention (daily 4am UTC)
#
# Handler: `scheduled` in the SvelteKit-generated _worker.js, which is
# wrapped by scripts/wrap-worker-with-scheduled.mjs at build time to add
# a scheduled() export that delegates to src/lib/server/cron/index.ts.
[triggers]
crons = ["*/5 * * * *", "0 * * * *", "0 4 * * *"]

# Durable Objects — SignalRoom is the per-room signalling DO for the
# Proximity Protocol. BusPulseSegment stores anonymous per-route-segment
# parade sightings; no coordinates or device ids are persisted.
[[migrations]]
tag = "v1"
new_classes = ["SignalRoom"]

[[migrations]]
tag = "v2"
deleted_classes = ["SignalRoom"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["SignalRoom"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["BusPulseSegment"]

[[durable_objects.bindings]]
name = "SIGNAL_ROOM"
class_name = "SignalRoom"

[[durable_objects.bindings]]
name = "BUS_PULSE"
class_name = "BusPulseSegment"

[vars]
SHIPPIE_ENV = "production"
PUBLIC_ORIGIN = "https://shippie.app"
AUTH_EMAIL_FROM = "Shippie <login@shippie.app>"
SEALED_DOCS_ENABLED = "true"
SEALED_DOC_CHANGE_STREAM_ENABLED = "true"
SEALED_DOC_DAILY_EVENT_LIMIT = "20000"
SEALED_DOC_DAILY_BYTE_LIMIT = "104857600"
SEALED_DOC_IP_DAILY_EVENT_LIMIT = "50000"
SEALED_DOC_DEVICE_DAILY_EVENT_LIMIT = "10000"
SEALED_DOC_DEVICE_DAILY_BYTE_LIMIT = "262144000"
SEALED_DOC_MAX_ATTACHMENT_BYTES = "26214400"
SEALED_DOC_DAILY_ATTACHMENT_BYTE_LIMIT = "1073741824"
SEALED_DOC_DEVICE_DAILY_ATTACHMENT_BYTE_LIMIT = "536870912"

# Cloudflare populates env.CF_VERSION_METADATA.id with the deployment
# version ID. The marketplace SW reads it to stamp the cache name so
# old caches drop on activate when the worker version changes. Without
# this binding the SW falls back to a 'dev' literal and stops
# invalidating on deploy.
[version_metadata]
binding = "CF_VERSION_METADATA"
