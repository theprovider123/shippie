<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/__shippie-pwa/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-167.png" sizes="167x167" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-152.png" sizes="152x152" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#14120F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shippie" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta property="og:title" content="Shippie — Ship local." />
    <meta property="og:description" content="Open marketplace for installable web apps. No app store. Just the web, installed." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      /* First-paint visual state — keeps the PWA dark instead of white
         during the iOS Safari WebView cold-boot window (~500ms–3s on a
         paused PWA). Removed once SvelteKit's root +layout.svelte mounts
         and sets body[data-app-ready=true]. */
      html, body { margin: 0; background: #14120F; color: #EDE4D3; }
      #boot-loader {
        position: fixed; inset: 0; z-index: 2147483647;
        display: grid; place-items: center;
        background: #14120F;
        opacity: 1; transition: opacity 200ms ease-out;
        pointer-events: none;
      }
      #boot-loader svg {
        width: 96px; height: 96px;
        animation: shippie-boot-fade 1.5s ease-out;
      }
      @keyframes shippie-boot-fade {
        0% { opacity: 0; transform: scale(0.96); }
        100% { opacity: 1; transform: scale(1); }
      }
      body[data-app-ready="true"] #boot-loader { opacity: 0; pointer-events: none; }
      @media (prefers-reduced-motion: reduce) {
        #boot-loader { transition: none; }
        #boot-loader svg { animation: none; }
      }
    </style>
    %sveltekit.head%
    <script>
      // Self-healing PWA shell. If an installed PWA resumes with a stale
      // SvelteKit document, modulepreload/dynamic imports can fail before
      // the app has a chance to render anything useful. Clear only Shippie
      // shell caches and reload once; the fresh service worker will rebuild
      // the cache with the current deploy.
      (function () {
        var RECOVERY_KEY = 'shippie:shell-recovered-once';
        var RECOVERY_PARAM = 'shippie_recover';
        function isAssetUrl(value) {
          return typeof value === 'string' &&
            (value.indexOf('/_app/immutable/') !== -1 || value.indexOf('/__shippie-run/') !== -1);
        }
        function looksLikeShellAssetFailure(reason) {
          var message = '';
          if (typeof reason === 'string') message = reason;
          else if (reason && typeof reason.message === 'string') message = reason.message;
          return /Failed to fetch dynamically imported module|Importing a module script failed|error loading dynamically imported module|Load failed|Loading chunk|module script/i.test(message);
        }
        function clearShippieCaches() {
          if (!('caches' in window)) return Promise.resolve();
          return caches.keys().then(function (names) {
            return Promise.all(names
              .filter(function (name) {
                return name.indexOf('shippie-marketplace-') === 0 || name === 'shippie.models.v1';
              })
              .map(function (name) { return caches.delete(name); }));
          }).catch(function () {});
        }
        function recover() {
          try {
            var url = new URL(location.href);
            if (url.searchParams.has(RECOVERY_PARAM)) return;
            if (sessionStorage.getItem(RECOVERY_KEY) === '1') return;
            sessionStorage.setItem(RECOVERY_KEY, '1');
            url.searchParams.set(RECOVERY_PARAM, String(Date.now()));
            clearShippieCaches().then(function () {
              location.replace(url.toString());
            });
          } catch (_) {
            location.reload();
          }
        }
        window.__shippieRepairShell = function () {
          try { sessionStorage.removeItem(RECOVERY_KEY); } catch (_) {}
          clearShippieCaches().then(function () {
            location.replace('/');
          });
        };
        window.addEventListener('error', function (event) {
          var target = event && event.target;
          if (target && (isAssetUrl(target.src) || isAssetUrl(target.href))) {
            recover();
            return;
          }
          if (looksLikeShellAssetFailure(event.error || event.message)) recover();
        }, true);
        window.addEventListener('unhandledrejection', function (event) {
          if (looksLikeShellAssetFailure(event.reason)) recover();
        });
      })();

      // Phase 9.1 — register the marketplace service worker on the
      // root platform host only. Maker subdomains have their own SW
      // served by the wrapper at /__shippie/sw.js.
      //
      // Update flow:
      //  1. On registration, listen for `updatefound`.
      //  2. When a new worker reaches `installed` and this page already
      //     has a controller, ask it to activate immediately.
      //  3. `controllerchange` reloads the page once so the current
      //     document and immutable chunks come from the same deploy.
      //  4. Calling `registration.update()` on `visibilitychange` makes
      //     the PWA pick up new builds when the user returns to the tab.
      if ('serviceWorker' in navigator) {
        var h = location.hostname;
        var isPlatform = h === 'shippie.app' || h === 'www.shippie.app' ||
                         h === 'next.shippie.app' || h === 'localhost' ||
                         h === '127.0.0.1' || h === '::1' || h === '[::1]';
        if (isPlatform) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/__shippie-pwa/sw.js', { scope: '/' })
              .then(function (reg) {
                window.__shippieSwReg = reg;
                function activateUpdatedWorker(worker) {
                  if (!worker || !navigator.serviceWorker.controller) return;
                  try {
                    worker.postMessage('SKIP_WAITING');
                  } catch (_) {}
                }
                function watchInstalling(worker) {
                  if (!worker) return;
                  worker.addEventListener('statechange', function () {
                    if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                      activateUpdatedWorker(worker);
                    }
                  });
                }
                if (reg.waiting && navigator.serviceWorker.controller) {
                  activateUpdatedWorker(reg.waiting);
                }
                if (reg.installing) watchInstalling(reg.installing);
                reg.addEventListener('updatefound', function () {
                  watchInstalling(reg.installing);
                });
              })
              .catch(function (err) { console.warn('[shippie] marketplace sw failed', err); });
            // Reload once when control flips to the new worker.
            var refreshing = false;
            var hadController = !!navigator.serviceWorker.controller;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (!hadController) {
                hadController = true;
                return;
              }
              if (window.__shippieSuppressNextControllerReload) {
                window.__shippieSuppressNextControllerReload = false;
                return;
              }
              if (refreshing) return;
              refreshing = true;
              location.reload();
            });
            // Poll for new builds when the tab returns to visible.
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible' && window.__shippieSwReg) {
                window.__shippieSwReg.update().then(function (reg) {
                  if (reg.waiting && navigator.serviceWorker.controller) {
                    reg.waiting.postMessage('SKIP_WAITING');
                  }
                }).catch(function () {});
              }
            });
          });
        }
      }
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="boot-loader" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">

          <path d="M512 652 C530 690 550 717 552 757 C537 742 522 746 512 780 C502 746 487 742 472 757 C474 717 494 690 512 652 Z" fill="#E8603C"/>
        </g>

    </div>
    <script>
      // The loader is cosmetic only. The Svelte root also marks the app
      // ready, but installed PWAs can briefly boot from a stale shell; this
      // fallback prevents the first screen from trapping taps if hydration is
      // delayed by the service worker or a cold mobile resume.
      (function () {
        function markReady() {
          document.body.dataset.appReady = 'true';
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () {
            requestAnimationFrame(markReady);
          }, { once: true });
        } else {
          requestAnimationFrame(markReady);
        }
        setTimeout(markReady, 1200);
      })();
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
