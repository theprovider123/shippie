<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/__shippie-pwa/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-167.png" sizes="167x167" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-152.png" sizes="152x152" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14120F" />
    <meta property="og:title" content="Shippie — Ship local." />
    <meta property="og:description" content="Open marketplace for installable web apps. No app store. Just the web, installed." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    %sveltekit.head%
    <script>
      // Phase 9.1 — register the marketplace service worker on the
      // root platform host only. Maker subdomains have their own SW
      // served by the wrapper at /__shippie/sw.js.
      //
      // Update flow:
      //  1. On registration, listen for `updatefound`.
      //  2. When a new worker reaches `installed` AND there's already a
      //     controller (i.e. this isn't a first install), fire a
      //     window-level event that the Toast layer picks up and renders
      //     "New version available · Tap to refresh".
      //  3. The toast action posts 'SKIP_WAITING' to the new worker;
      //     `controllerchange` then reloads the page.
      //  4. Calling `registration.update()` on `visibilitychange` makes
      //     the PWA pick up new builds when the user returns to the tab.
      if ('serviceWorker' in navigator) {
        var h = location.hostname;
        var isPlatform = h === 'shippie.app' || h === 'www.shippie.app' ||
                         h === 'next.shippie.app' || h === 'localhost';
        if (isPlatform) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/__shippie-pwa/sw.js', { scope: '/' })
              .then(function (reg) {
                window.__shippieSwReg = reg;
                function watchInstalling(worker) {
                  if (!worker) return;
                  worker.addEventListener('statechange', function () {
                    if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                      window.dispatchEvent(new CustomEvent('shippie:sw-update-ready'));
                    }
                  });
                }
                if (reg.waiting && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('shippie:sw-update-ready'));
                }
                if (reg.installing) watchInstalling(reg.installing);
                reg.addEventListener('updatefound', function () {
                  watchInstalling(reg.installing);
                });
              })
              .catch(function (err) { console.warn('[shippie] marketplace sw failed', err); });
            // Reload once when control flips to the new worker.
            var refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (refreshing) return;
              refreshing = true;
              location.reload();
            });
            // Poll for new builds when the tab returns to visible.
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible' && window.__shippieSwReg) {
                window.__shippieSwReg.update().catch(function () {});
              }
            });
          });
        }
      }
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
